<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query - StudyHive</title>
    <link rel="stylesheet" href="query.css">
</head>
<body>

  <!-- Navigation -->
  <div class="topnav">
    <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
      <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
      StudyHive
    </a>
    <div class="nav-links">
      <a class="nav" href="index.html">Home</a>
      <a class="nav" href="tutorials.html">Tutorials</a>
      <a class="nav" href="notes.html">Notes</a>
      <a class="nav" href="assignments.html">Assignments</a>
      <a class="nav" href="about.html">About</a>
      <a class="nav active" href="query.html">Query</a>
    </div>
  </div>

  <div class="query-container">
      <div style="text-align: center;">
          <h1 class="brand-title">Student Queries</h1>
          <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 40px;">Ask questions and help fellow students.</p>
      </div>

      <div class="query-form-wrapper">
          <div class="query-form">
              <h2>Ask a Question</h2>
              <form id="queryForm">
                  <div class="form-group">
                      <label for="studentName">Your Name:</label>
                      <input type="text" id="studentName" name="studentName" placeholder="Enter your name" required>
                  </div>
                  <div class="form-group">
                      <label for="question">Your Question:</label>
                      <textarea id="question" name="question" rows="4" placeholder="Enter your question details" required></textarea>
                  </div>
                  <button type="submit">Submit Question</button>
              </form>
          </div>
      </div>

      <!-- Chatbase Snippet -->
      <script>
          (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="0QUMwyU9XeOCfjrwvYTlg";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
      </script>

      <div class="answers-section">
          <h2>Community Questions</h2>
          <div id="questionsContainer"></div>
      </div>
  </div>

  <script src="query.js"></script>
</body>
</html>
