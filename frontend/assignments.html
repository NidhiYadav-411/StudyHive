<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - StudyHive</title>
    <link rel="stylesheet" href="assignments.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div class="topnav">
        <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
            <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
            StudyHive
        </a>
        <div class="nav-links">
            <a class="nav" href="index.html">Home</a>
            <a class="nav" href="tutorials.html">Tutorials</a>
            <a class="nav" href="notes.html">Notes</a>
            <a class="nav active" href="assignments.html">Assignments</a>
            <a class="nav" href="about.html">About</a>
            <a class="nav" href="query.html">Query</a>
        </div>
    </div>

    <div class="assignments-container">
        <div style="text-align: center;">
            <h1 class="brand-title">Assignments & Question Banks</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Find practical materials for your exam preparations.</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search assignments...">
        </div>

        <div class="assignments-grid" id="assignmentList">
            <!-- Loaded dynamically -->
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const assignmentList = document.getElementById('assignmentList');

        window.addEventListener('DOMContentLoaded', () => {
            fetchAssignments();
        });

        async function fetchAssignments() {
            try {
                const response = await fetch(`${API_BASE}/assignments`);
                const data = await response.json();
                
                assignmentList.innerHTML = '';
                
                if (data.assignments && data.assignments.length > 0) {
                    data.assignments.forEach(assign => {
                        const icon = getIcon(assign.title, assign.filename);
                        const safePath = assign.filepath.replace(/\\/g, '/');
                        const fileUrl = `${API_BASE.replace('/api', '')}/${safePath}`;

                        const card = document.createElement('a');
                        card.href = fileUrl;
                        card.target = '_blank';
                        card.className = 'assignment-card block';
                        card.setAttribute('data-title', assign.title);
                        card.innerHTML = `
                            <div class="assignment-icon">${icon}</div>
                            <div class="assignment-title">${assign.title}</div>
                        `;
                        assignmentList.appendChild(card);
                    });
                } else {
                    assignmentList.innerHTML = '<div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 20px;">No assignments uploaded yet.</div>';
                }
            } catch (e) {
                console.error("Failed to load assignments:", e);
                assignmentList.innerHTML = '<div style="color: #e74c3c; grid-column: 1/-1; text-align: center; padding: 20px;">Error loading assignments.</div>';
            }
        }

        function getIcon(title, filename) {
            const titleLower = title.toLowerCase();
            const ext = filename ? filename.split('.').pop().toLowerCase() : '';
            if (titleLower.includes('electrical') || titleLower.includes('physics')) {
                return '⚡';
            }
            if (ext === 'doc' || ext === 'docx') {
                return '💻';
            }
            return '📄';
        }

        searchInput.addEventListener('input', function () {
            const filter = searchInput.value.toLowerCase();
            const blocks = document.querySelectorAll('.block');
            
            blocks.forEach(block => {
                const title = block.getAttribute('data-title').toLowerCase();
                if (title.includes(filter)) {
                    block.style.display = 'flex';
                } else {
                    block.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
