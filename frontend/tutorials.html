<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials - StudyHive</title>
    <link rel="stylesheet" href="tutorials.css">
</head>
<body>
  <!-- Navigation -->
  <div class="topnav">
    <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
      <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
      StudyHive
    </a>
    <div class="nav-links">
      <a class="nav" href="index.html">Home</a>
      <a class="nav active" href="tutorials.html">Tutorials</a>
      <a class="nav" href="notes.html">Notes</a>
      <a class="nav" href="assignments.html">Assignments</a>
      <a class="nav" href="about.html">About</a>
      <a class="nav" href="query.html">Query</a>
    </div>
    <form class="search-form" onsubmit="return false;">
      <input class="search-input" id="searchInput" type="text" placeholder="Search tutorials..." onkeyup="filterVideos()">
      <span style="cursor: pointer; padding-left: 5px;" onclick="filterVideos()">🔍</span>
    </form>
  </div>

  <div class="container">
    <div style="text-align: center;">
      <h1 class="brand-title">Video Tutorials</h1>
      <p style="color: var(--text-muted); font-size: 1.2rem;">Learn from curated video content</p>
    </div>

    <div class="videos-grid" id="videoContainer">
        <!-- Loaded dynamically from database -->
    </div>
  </div>

  <script src="index.js"></script>
  <script>
      window.addEventListener('DOMContentLoaded', () => {
          fetchTutorials();
      });

      async function fetchTutorials() {
          try {
              const response = await fetch(`${API_BASE}/tutorials`);
              const data = await response.json();
              const container = document.getElementById('videoContainer');
              if(!container) return;
              container.innerHTML = '';

              if (data.tutorials && data.tutorials.length > 0) {
                  data.tutorials.forEach(t => {
                      const card = document.createElement('div');
                      card.className = 'video-card block';
                      card.setAttribute('data-title', t.title);
                      card.innerHTML = `
                          <div class="video-title">${t.title}</div>
                          <div class="video-wrapper">
                              <iframe src="${t.video_url}" allowfullscreen></iframe>
                          </div>
                      `;
                      container.appendChild(card);
                  });
              } else {
                  container.innerHTML = `<div style="text-align: center; color: var(--text-muted); grid-column: 1/-1; padding: 40px; font-size: 1.2rem;">No video tutorials uploaded yet.</div>`;
              }
          } catch(e) {
              console.error("Failed to load tutorials", e);
              const container = document.getElementById('videoContainer');
              if (container) {
                  container.innerHTML = `<div style="text-align: center; color: #e74c3c; grid-column: 1/-1; padding: 40px; font-size: 1.2rem;">Failed to load tutorials from server.</div>`;
              }
          }
      }

      function filterVideos() {
          const input = document.getElementById('searchInput').value.toLowerCase();
          const blocks = document.querySelectorAll('.block');
          blocks.forEach(block => {
              const title = block.getAttribute('data-title').toLowerCase();
              block.style.display = title.includes(input) ? 'block' : 'none';
          });
      }
  </script>
</body>
</html>
