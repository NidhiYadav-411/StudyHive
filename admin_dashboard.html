<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - StudyHive</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .admin-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--glass-shadow);
            margin-bottom: 30px;
        }
        .file-upload-box {
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s ease;
        }
        .file-upload-box:hover {
            border-color: var(--primary-gradient);
            background: rgba(255,255,255,0.05);
        }
        #fileInput { margin-top: 15px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        th { color: var(--text-muted); font-weight: 500; }
        td { color: var(--text-main); }
        .action-cell { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <div class="topnav">
        <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
            <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
            StudyHive Admin
        </a>
        <div class="nav-links">
            <button class="btn-primary" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="dashboard-container">
        <h1 class="brand-title" style="font-size: 2.5rem; justify-content: flex-start; margin-bottom: 30px;">
            Admin Dashboard
        </h1>

        <div class="admin-panel">
            <h2>Upload New Notes</h2>
            <div class="file-upload-box">
                <p style="color: var(--text-muted); margin-bottom: 15px;">Configure Note Details</p>
                <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;">
                    <select id="subjectInput" style="padding: 10px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid var(--glass-border); width: 100%; max-width: 400px; font-size: 0.9rem;">
                        <option value="" disabled selected>-- Select a Subject --</option>
                        <option value="Engineering Mathematics">Engineering Mathematics (Calculus, Linear Algebra, Diff Eq)</option>
                        <option value="Engineering Physics">Engineering Physics</option>
                        <option value="Engineering Chemistry">Engineering Chemistry</option>
                        <option value="Basic Electrical Engineering">Basic Electrical Engineering</option>
                        <option value="Basic Electronics Engineering">Basic Electronics Engineering</option>
                        <option value="Engineering Mechanics">Engineering Mechanics</option>
                        <option value="Engineering Graphics and Drawing">Engineering Graphics and Drawing</option>
                        <option value="Computer Programming (C, Python, C++)">Computer Programming (C, Python, C++)</option>
                        <option value="Environmental Science">Environmental Science</option>
                        <option value="Communication Skills / English">Communication Skills / English</option>
                        <option value="Workshop Practice">Workshop Practice</option>
                        <option value="Data Structures and Algorithms">Data Structures and Algorithms</option>
                        <option value="Operating Systems">Operating Systems</option>
                        <option value="Database Management Systems (DBMS)">Database Management Systems (DBMS)</option>
                        <option value="Computer Networks">Computer Networks</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Computer Organization and Architecture">Computer Organization and Architecture</option>
                        <option value="Artificial Intelligence & Machine Learning">Artificial Intelligence and Machine Learning</option>
                        <option value="Discrete Mathematics">Discrete Mathematics</option>
                        <option value="Cloud Computing">Cloud Computing</option>
                        <option value="Theory of Computation and Compiler Design">Theory of Computation and Compiler Design</option>
                        <option value="Thermodynamics">Thermodynamics</option>
                        <option value="Fluid Mechanics">Fluid Mechanics</option>
                        <option value="Strength of Materials / Mechanics of Solids">Strength of Materials / Mechanics of Solids</option>
                        <option value="Heat and Mass Transfer">Heat and Mass Transfer</option>
                        <option value="Kinematics and Dynamics of Machines">Kinematics and Dynamics of Machines</option>
                        <option value="Manufacturing Technology and Processes">Manufacturing Technology and Processes</option>
                        <option value="Machine Design">Machine Design</option>
                        <option value="Automobile Engineering">Automobile Engineering</option>
                        <option value="Robotics and Automation">Robotics and Automation</option>
                        <option value="Analog and Digital Electronics">Analog and Digital Electronics</option>
                        <option value="Signals and Systems">Signals and Systems</option>
                        <option value="Control Systems">Control Systems</option>
                        <option value="Microprocessors and Microcontrollers">Microprocessors and Microcontrollers</option>
                        <option value="Electrical Machines">Electrical Machines</option>
                        <option value="Power Systems">Power Systems</option>
                        <option value="VLSI Design">VLSI Design</option>
                        <option value="Electromagnetic Theory">Electromagnetic Theory</option>
                        <option value="Communication Systems (Analog/Digital)">Communication Systems (Analog/Digital)</option>
                        <option value="Structural Analysis">Structural Analysis</option>
                        <option value="Geotechnical Engineering (Soil Mechanics)">Geotechnical Engineering (Soil Mechanics)</option>
                        <option value="Surveying and Geomatics">Surveying and Geomatics</option>
                        <option value="Construction Materials and Planning">Construction Materials and Planning</option>
                        <option value="Environmental Engineering">Environmental Engineering</option>
                        <option value="Transportation Engineering">Transportation Engineering</option>
                        <option value="Hydrology and Water Resources Engineering">Hydrology and Water Resources Engineering</option>
                        <option value="Concrete Technology">Concrete Technology</option>
                        <option value="Chemical Reaction Engineering">Chemical Reaction Engineering</option>
                        <option value="Mass Transfer and Separation Processes">Mass Transfer and Separation Processes</option>
                        <option value="Process Dynamics and Control">Process Dynamics and Control</option>
                        <option value="Aerodynamics and Propulsion (Aerospace)">Aerodynamics and Propulsion (Aerospace)</option>
                        <option value="Molecular Biology and Genetic Engineering">Molecular Biology and Genetic Engineering (Biotechnology)</option>
                        <option value="Petroleum Reservoir Engineering">Petroleum Reservoir Engineering</option>
                        <option value="Professional Ethics">Professional Ethics</option>
                        <option value="Industrial Management and Economics">Industrial Management and Economics</option>
                        <option value="Major Research Project">Major Research Project</option>
                        <option value="Industrial Internship / Training">Industrial Internship / Training</option>
                    </select>
                    <input type="text" id="topicInput" placeholder="Topic name (e.g. Thermodynamics, OOPs)..." style="padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border); width: 100%; max-width: 400px; font-size: 0.9rem;">
                </div>
                <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.docx" />
                <br><br>
                <button class="btn-primary" onclick="uploadNote()">Upload to Database</button>
            </div>
            <div id="uploadStatus" style="color: #2ecc71; margin-top: 10px;"></div>
        </div>

        <div class="admin-panel">
            <h2 style="color: #e74c3c;">Pending Community Contributions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Topic</th>
                        <th>Contributor ID</th>
                        <th>File Name</th>
                        <th>File Path</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pendingNotesTableBody">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>

        <div class="admin-panel">
            <h2>Approved & Direct Upload Notes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Topic</th>
                        <th>File Name</th>
                        <th>Uploaded At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="notesTableBody">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        // Check if admin is truly logged in
        window.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (!userStr) {
                alert("You are not logged in!");
                window.location.href = "index.html";
                return;
            }
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                alert("Unauthorized Access. Admin only.");
                window.location.href = "index.html";
            }
            fetchNotes();
            fetchPendingNotes();
        });

        async function uploadNote() {
            const fileInput = document.getElementById('fileInput');
            const subjectInput = document.getElementById('subjectInput').value;
            const topicInput = document.getElementById('topicInput').value;
            
            if (fileInput.files.length === 0) {
                alert("Please select a file.");
                return;
            }
            if (!topicInput) {
                alert("Please write a topic name.");
                return;
            }
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("subject", subjectInput);
            formData.append("topic", topicInput);
            
            document.getElementById('uploadStatus').innerText = "Uploading...";

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(response.ok) {
                    document.getElementById('uploadStatus').innerText = "Uploaded successfully!";
                    fileInput.value = "";
                    document.getElementById('topicInput').value = "";
                    fetchNotes(); // reload table
                } else {
                    document.getElementById('uploadStatus').innerText = "Error: " + data.error;
                }
            } catch(e) {
                document.getElementById('uploadStatus').innerText = "Upload failed.";
            }
        }

        async function fetchNotes() {
            try {
                const response = await fetch(`${API_BASE}/notes`);
                const data = await response.json();
                const tbody = document.getElementById('notesTableBody');
                tbody.innerHTML = '';

                data.notes.forEach(note => {
                    const tr = document.createElement('tr');
                    
                    const date_str = new Date(note.uploaded_at).toLocaleString();
                    
                    tr.innerHTML = `
                        <td>${note.subject}</td>
                        <td>${note.topic}</td>
                        <td>${note.original_name}</td>
                        <td>${date_str}</td>
                        <td class="action-cell">
                            <button class="btn-secondary" style="padding: 5px 15px;" onclick="generateQuiz(${note.id})">Generate AI Quiz</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) {
                console.error("Failed to load notes", e);
            }
        }

        async function generateQuiz(note_id) {
            alert("Generating Quiz via AI... this will take a few seconds.");
            try {
                const response = await fetch(`${API_BASE}/generate_quiz`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_id })
                });
                const data = await response.json();
                if(response.ok) {
                    alert("Success! Quiz generated. Quiz ID: " + data.quiz_id);
                } else {
                    alert("Error: " + data.error);
                }
            } catch(e) {
                alert("Request failed.");
            }
        }

        async function fetchPendingNotes() {
            try {
                const response = await fetch(`${API_BASE}/admin/pending`);
                const data = await response.json();
                const tbody = document.getElementById('pendingNotesTableBody');
                tbody.innerHTML = '';

                data.notes.forEach(note => {
                    const tr = document.createElement('tr');
                    const safePath = note.filepath.replace(/\\/g, '/');
                    tr.innerHTML = `
                        <td>${note.subject}</td>
                        <td>${note.topic}</td>
                        <td>UID: ${note.uploaded_by}</td>
                        <td>${note.original_name}</td>
                        <td><a href="${safePath}" target="_blank" style="color:var(--accent);">View Note</a></td>
                        <td class="action-cell">
                            <button class="btn-primary" style="padding: 5px 10px; background: #2ecc71;" onclick="moderateNote(${note.id}, 'approve')">Approve (Gen Quiz)</button>
                            <button class="btn-secondary" style="padding: 5px 10px; background: #e74c3c; border-color: #e74c3c;" onclick="moderateNote(${note.id}, 'reject')">Deny</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) {
                console.error("Failed to load pending notes", e);
            }
        }

        async function moderateNote(note_id, action) {
            if(!confirm(`Are you sure you want to ${action} this note?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/moderate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_id, action })
                });
                
                if(response.ok) {
                    // if approved, quickly generate quiz behind the scenes
                    if (action === 'approve') {
                        // Suppress alert so it's smooth
                        fetch(`${API_BASE}/generate_quiz`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ note_id })
                        });
                    }
                    fetchPendingNotes();
                    fetchNotes(); // refreshing approved table
                } else {
                    alert("Moderation action failed.");
                }
            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
