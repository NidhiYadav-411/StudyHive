<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - StudyHive</title>
    <link rel="stylesheet" href="assignments.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div class="topnav">
        <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
            <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
            StudyHive
        </a>
        <div class="nav-links">
            <a class="nav" href="index.html">Home</a>
            <a class="nav" href="tutorials.html">Tutorials</a>
            <a class="nav" href="notes.html">Notes</a>
            <a class="nav active" href="assignments.html">Assignments</a>
            <a class="nav" href="about.html">About</a>
            <a class="nav" href="query.html">Query</a>
        </div>
    </div>

    <div class="assignments-container">
        <div style="text-align: center;">
            <h1 class="brand-title">Assignments & Question Banks</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Find practical materials for your exam preparations.</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search assignments...">
        </div>

        <div class="assignments-grid" id="assignmentList">
            <a href="assignments/B.Tech.First year 23-24 (Assignment - I) (4).pdf" target="_blank" class="assignment-card block" data-title="Math 2 : Unit 1">
                <div class="assignment-icon">📄</div>
                <div class="assignment-title">Math 2 : Unit 1</div>
            </a>
            <a href="assignments/B.Tech.First year 23-24 (Assignment - III) (1).pdf" target="_blank" class="assignment-card block" data-title="Math 2 : Unit 3">
                <div class="assignment-icon">📄</div>
                <div class="assignment-title">Math 2 : Unit 3</div>
            </a>
            <a href="assignments/EE All Unit 2 mrks que. PUT & semester.pdf" target="_blank" class="assignment-card block" data-title="Electrical 2 Marks Questions">
                <div class="assignment-icon">⚡</div>
                <div class="assignment-title">Electrical 2 Marks Questions</div>
            </a>
            <a href="assignments/PPS IMPORTANT QUESTIONS 2024 even sem.docx" target="_blank" class="assignment-card block" data-title="PPS Question Bank 1">
                <div class="assignment-icon">💻</div>
                <div class="assignment-title">PPS Question Bank 1</div>
            </a>
            <a href="assignments/PPS IMPORTANT QUESTIONS and solution pinki.docx" target="_blank" class="assignment-card block" data-title="PPS Question Bank 2">
                <div class="assignment-icon">💻</div>
                <div class="assignment-title">PPS Question Bank 2</div>
            </a>
            <a href="assignments/PPS IMPORTANT QUESTIONS G2.docx" target="_blank" class="assignment-card block" data-title="PPS Question Bank 3">
                <div class="assignment-icon">💻</div>
                <div class="assignment-title">PPS Question Bank 3</div>
            </a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', function () {
            const filter = searchInput.value.toLowerCase();
            const blocks = document.querySelectorAll('.block');
            
            blocks.forEach(block => {
                const title = block.getAttribute('data-title').toLowerCase();
                if (title.includes(filter)) {
                    block.style.display = 'flex';
                } else {
                    block.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
