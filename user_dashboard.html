<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - StudyHive</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .user-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--glass-shadow);
            margin-bottom: 30px;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .header-section h2 { color: var(--accent); margin: 0; }
        
        .badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255, 107, 129, 0.2);
            border: 1px solid var(--accent);
            color: white;
            font-weight: 600;
        }
        
        .upload-section {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .search-bar {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar:focus {
            border-color: var(--accent);
        }

        .recent-notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .note-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: left;
            transition: all 0.3s ease;
        }
        .note-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin-top: 20px;
        }
        
        select, input[type="text"] {
            padding: 10px; 
            border-radius: 8px; 
            background: #1e293b; 
            color: white; 
            border: 1px solid var(--glass-border);
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="topnav">
        <a class="brand-title" href="index.html" style="font-size: 1.5rem; margin: 0;">
            <img src="assets/STUDYHIVE.webp" alt="StudyHive Logo" style="width: 30px; height: 30px; border-radius: 5px;">
            StudyHive
        </a>
        <div class="nav-links">
            <a class="nav" href="index.html">Home</a>
            <a class="nav" href="notes.html">Notes</a>
            <button class="btn-primary" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="dashboard-container">
        <h1 class="brand-title" style="font-size: 2.5rem; justify-content: center; margin-bottom: 30px;">
            Student Dashboard
        </h1>

        <div class="user-panel">
            <div class="header-section">
                <div>
                    <h2>Welcome back, <span id="userName">Student</span>!</h2>
                    <p style="color: var(--text-muted); margin-top:5px;">Track your scores and contribute community notes.</p>
                </div>
                <div style="text-align: right;">
                    <span class="badge" id="userBadge">🌟 Novice (0 pts)</span>
                </div>
            </div>
            
            <div class="upload-section">
                <h3 style="color: white; margin-bottom: 10px;">Contribute to StudyHive</h3>
                <p style="color: var(--text-muted); margin-bottom: 15px;">Earn 10 points for every approved curriculum upload!</p>
                <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;">
                    <select id="subjectInput">
                        <option value="" disabled selected>-- Select a Subject --</option>
                        <option value="Engineering Mathematics">Engineering Mathematics (Calculus, Linear Algebra, Diff Eq)</option>
                        <option value="Engineering Physics">Engineering Physics</option>
                        <option value="Engineering Chemistry">Engineering Chemistry</option>
                        <option value="Basic Electrical Engineering">Basic Electrical Engineering</option>
                        <option value="Basic Electronics Engineering">Basic Electronics Engineering</option>
                        <option value="Engineering Mechanics">Engineering Mechanics</option>
                        <option value="Engineering Graphics and Drawing">Engineering Graphics and Drawing</option>
                        <option value="Computer Programming (C, Python, C++)">Computer Programming (C, Python, C++)</option>
                        <option value="Data Structures and Algorithms">Data Structures and Algorithms</option>
                        <option value="Operating Systems">Operating Systems</option>
                        <option value="Database Management Systems (DBMS)">Database Management Systems (DBMS)</option>
                        <option value="Thermodynamics">Thermodynamics</option>
                        <option value="Fluid Mechanics">Fluid Mechanics</option>
                        <option value="Machine Design">Machine Design</option>
                    </select>
                    <input type="text" id="topicInput" placeholder="Topic name (e.g. Thermodynamics, OOPs)...">
                </div>
                <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.docx" />
                <br><br>
                <button class="btn-primary" onclick="uploadContribution()">Submit for Review</button>
                <div id="uploadStatus" style="color: #2ecc71; margin-top: 10px;"></div>
            </div>
            
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="user-panel">
            <h2 style="color: var(--text-main);">Search & Study Database</h2>
            <input type="text" id="topicSearch" class="search-bar" placeholder="Search for a subject or topic... (e.g. Mechanical, Thermodynamics)" oninput="filterNotes()">
            
            <div class="recent-notes" id="notesList">
               <!-- Auto populated -->
            </div>
        </div>

    </div>

    <script src="index.js"></script>
    <script>
        let allNotes = [];
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (!userStr) {
                window.location.href = "index.html";
                return;
            }
            currentUser = JSON.parse(userStr);
            
            fetchUserProfile(currentUser.id);
            fetchUserAnalytics(currentUser.id);
            fetchAvailableNotes();
        });

        async function fetchUserProfile(userId) {
            try {
                const res = await fetch(`${API_BASE}/user/${userId}`);
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('userName').innerText = data.user.name;
                    const pts = data.user.points || 0;
                    
                    let badgeName = "🌱 Novice";
                    if(pts >= 250) badgeName = "👑 Master Contributor";
                    else if (pts >= 100) badgeName = "🎓 Scholar";
                    else if (pts >= 50) badgeName = "💎 Valued Contributor";
                    else if (pts >= 10) badgeName = "⭐ Helper";
                    
                    document.getElementById('userBadge').innerText = `${badgeName} (${pts} pts)`;
                }
            } catch(e) {
                console.log("Profile error:", e);
            }
        }

        async function uploadContribution() {
            const fileInput = document.getElementById('fileInput');
            const subjectInput = document.getElementById('subjectInput').value;
            const topicInput = document.getElementById('topicInput').value;
            
            if (fileInput.files.length === 0) {
                alert("Please select a file.");
                return;
            }
            if (!topicInput || !subjectInput) {
                alert("Please configure subject and topic.");
                return;
            }
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("subject", subjectInput);
            formData.append("topic", topicInput);
            formData.append("user_id", currentUser.id); // Triggers pending queue
            
            document.getElementById('uploadStatus').innerText = "Submitting contribution...";

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(response.ok) {
                    document.getElementById('uploadStatus').innerText = "Contribution submitted to Admin for review!";
                    fileInput.value = "";
                    document.getElementById('topicInput').value = "";
                } else {
                    document.getElementById('uploadStatus').innerText = "Error: " + data.error;
                }
            } catch(e) {
                document.getElementById('uploadStatus').innerText = "Upload failed.";
            }
        }

        async function fetchUserAnalytics(user_id) {
            try {
                const res = await fetch(`${API_BASE}/analytics/${user_id}`);
                const data = await res.json();
                
                let labels = [];
                let scores = [];
                
                if (data.scores && data.scores.length > 0) {
                    data.scores.forEach((s, idx) => {
                        labels.push(`Attempt ${idx + 1}`);
                        const pct = (s.score / s.total) * 100;
                        scores.push(pct.toFixed(2));
                    });
                } else {
                    labels = ["No Data"];
                    scores = [0];
                }

                renderChart(labels, scores);
            } catch(e) {
                console.error("Analytic error", e);
            }
        }

        function renderChart(labels, dataPoints) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quiz Performance (%)',
                        data: dataPoints,
                        borderColor: '#ff6b81',
                        backgroundColor: 'rgba(255, 107, 129, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: 100, 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#bbb' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#bbb' }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });
        }

        async function fetchAvailableNotes() {
            try {
                const response = await fetch(`${API_BASE}/notes`);
                const data = await response.json();
                allNotes = data.notes || [];
                renderNotes(allNotes);
            } catch(e) {
                console.log(e);
            }
        }

        function renderNotes(notesToRender) {
            const container = document.getElementById('notesList');
            container.innerHTML = '';
            
            if (notesToRender.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted)">No notes match your search.</p>';
                return;
            }

            notesToRender.forEach(note => {
                const quiz_id = "auto_" + note.id;
                const safePath = note.filepath.replace(/\\/g, '/');
                
                const el = document.createElement('div');
                el.className = 'note-card';
                el.innerHTML = `
                    <h4 style="color: var(--text-main); margin-bottom: 5px;">${note.subject}</h4>
                    <strong style="color: var(--accent); font-size: 1.1rem;">${note.topic}</strong>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin: 10px 0;">Source File: ${note.original_name}</p>
                    
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <a href="${safePath}" target="_blank" class="btn-primary" style="padding: 5px 15px; font-size: 0.9rem; text-decoration:none;">Study Note</a>
                        <a href="quiz.html?id=${quiz_id}" class="btn-secondary" style="padding: 5px 15px; font-size: 0.9rem; text-decoration:none;">Take Quiz</a>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function filterNotes() {
            const term = document.getElementById('topicSearch').value.toLowerCase();
            const filtered = allNotes.filter(n => {
                const sub = (n.subject || "").toLowerCase();
                const top = (n.topic || "").toLowerCase();
                return sub.includes(term) || top.includes(term);
            });
            renderNotes(filtered);
        }
    </script>
</body>
</html>
